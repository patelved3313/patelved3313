<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="40" y1="0" x2="1160" y2="430" gradientUnits="userSpaceOnUse">
    <stop stop-color="#050A14"/>
    <stop offset="0.55" stop-color="#081426"/>
    <stop offset="1" stop-color="#0D1320"/>
  </linearGradient>
  <linearGradient id="brand" x1="96" y1="122" x2="650" y2="296" gradientUnits="userSpaceOnUse">
    <stop stop-color="#67E8F9"/>
    <stop offset="0.48" stop-color="#38BDF8"/>
    <stop offset="1" stop-color="#A78BFA"/>
  </linearGradient>
  <linearGradient id="orbit" x1="780" y1="74" x2="1105" y2="358" gradientUnits="userSpaceOnUse">
    <stop stop-color="#38BDF8"/>
    <stop offset="0.48" stop-color="#A78BFA"/>
    <stop offset="1" stop-color="#FB923C"/>
  </linearGradient>
  <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(931 215) rotate(90) scale(194)">
    <stop stop-color="#38BDF8" stop-opacity=".18"/>
    <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
    <path d="M36 0H0V36" stroke="#1E293B" stroke-width="1"/>
  </pattern>
  <filter id="softGlow" x="-70%" y="-70%" width="240%" height="240%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity=".38"/>
  </filter>
</defs>

<rect width="1200" height="430" rx="28" fill="url(#bg)"/>
<rect width="1200" height="430" rx="28" fill="url(#grid)" opacity=".38"/>
<ellipse cx="930" cy="215" rx="255" ry="215" fill="url(#glow)"/>
<rect x="1.5" y="1.5" width="1197" height="427" rx="26.5" stroke="#243247" stroke-width="3"/>

<g opacity=".95">
  <circle cx="52" cy="42" r="6" fill="#FB7185"/>
  <circle cx="73" cy="42" r="6" fill="#FBBF24"/>
  <circle cx="94" cy="42" r="6" fill="#34D399"/>
  <text x="121" y="49" fill="#64748B" font-family="JetBrains Mono, monospace" font-size="15">ved@portfolio:~/build</text>
