<text x="72" y="120" fill="#7DD3FC" font-family="JetBrains Mono, monospace" font-size="17" letter-spacing="4">AI • FULL-STACK • PRODUCT</text>
<text x="68" y="209" fill="url(#brand)" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="850" letter-spacing="-2">VED PATEL</text>
<text x="73" y="255" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="600">I build practical software that turns complex problems</text>
<text x="73" y="289" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="22">into clear, useful products people can actually use.</text>

<g font-family="JetBrains Mono, monospace" font-size="14">
